services:
  hal9000:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - /tmp/hal9000:/tmp/hal9000
      - ./workspace:/workspace
      - ./state:/state
    environment:
      - PYTHONUNBUFFERED=1
      - HAL9000_SOCKET_PATH=/tmp/hal9000/daemon.sock
      - HAL9000_MODEL
      - HAL9000_MAX_HISTORY
      - HAL9000_LOOP_INTERVAL
      - HAL9000_AGENT_TIMEOUT
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
    stop_signal: SIGTERM
