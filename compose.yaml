version: '3.8'

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    volumes:
      - workspace_data:/workspace
      - state_data:/state
      - agent_logs:/var/log/hal9000
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
      - HAL9000_OLLAMA_URL
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
    stop_signal: SIGTERM

  daemon:
    build:
      context: .
      dockerfile: Dockerfile.daemon
    volumes:
      - workspace_data:/workspace
      - state_data:/state
      - agent_logs:/var/log/hal9000
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
      - HAL9000_OLLAMA_URL
    depends_on:
      - agent
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
    stop_signal: SIGTERM

volumes:
  workspace_data:
  state_data:
  agent_logs:
