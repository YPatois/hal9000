services:
  hal9000:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    volumes:
      - /tmp/hal9000:/tmp/hal9000
      - ./workspace:/workspace
      - ./state:/state
      - ./logs/description:/host-logs/description:ro
    environment:
      - PYTHONUNBUFFERED=1
      - HAL9000_SOCKET_PATH=/tmp/hal9000/daemon.sock
      - HAL9000_MODEL=qwen3.6:35b
      - HAL9000_MAX_HISTORY
      - HAL9000_LOOP_INTERVAL=30
      - HAL9000_AGENT_TIMEOUT=600
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '2'
    cap_drop:
      - ALL
    cap_add:
      - SYS_PTRACE
    stop_signal: SIGTERM
