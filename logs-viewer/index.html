<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAL9000 Log Viewer</title>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d;
  --fg: #e6edf3; --fg2: #8b949e; --accent: #58a6ff; --green: #3fb950;
  --red: #f85149; --orange: #d29922; --mono: 'JetBrains Mono','Fira Code',monospace;
  --line-h: 1.5;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--fg); font-family: system-ui,sans-serif; line-height: var(--line-h); }
a { color: var(--accent); }
button { cursor: pointer; background: var(--bg3); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px; font-size: 13px; }
button:hover { background: var(--border); }
select, input, textarea { background: var(--bg2); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 13px; }

#app { display: flex; flex-direction: column; min-height: 100vh; }

/* Top bar */
#topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px; background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
#topbar h1 { font-size: 18px; font-weight: 600; margin-right: 8px; }
#topbar .stats { font-size: 12px; color: var(--fg2); display: flex; gap: 12px; }
#search-box { margin-left: auto; width: 200px; }

/* Main layout */
#main { display: flex; flex: 1; min-height: 0; }
#sidebar {
  width: 260px; min-width: 160px; overflow-y: auto;
  border-right: 1px solid var(--border);
  background: var(--bg2); padding: 8px;
  font-size: 13px;
  flex-shrink: 0;
}
#sidebar-resizer {
  width: 4px; cursor: col-resize; flex-shrink: 0;
  background: var(--border); transition: background 0.15s;
}
#sidebar-resizer:hover,
#sidebar-resizer.dragging { background: var(--accent); }
#content { flex: 1; overflow-y: auto; padding: 16px; min-width: 0; }

/* Sidebar sections */
.sidebar-section { margin-bottom: 16px; }
.sidebar-section h3 {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--fg2); margin-bottom: 6px; padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.state-row { display: flex; justify-content: space-between; padding: 2px 0; }
.state-row .label { color: var(--fg2); }
.state-row .value { font-family: var(--mono); font-size: 12px; }

/* File tree */
.file-tree-item {
  padding: 2px 4px; cursor: pointer; border-radius: 4px;
  display: flex; align-items: center; gap: 4px;
  font-family: var(--mono); font-size: 12px;
}
.file-tree-item:hover { background: var(--bg3); }
.file-tree-item .icon { width: 16px; text-align: center; color: var(--fg2); }
.file-tree-item.dir { font-weight: 500; }
.file-tree-item .size { margin-left: auto; color: var(--fg2); font-size: 11px; }
.file-tree-children { padding-left: 16px; }
.file-tree-item .arrow { width: 12px; text-align: center; color: var(--fg2); font-size: 10px; }
.folder-open > .file-tree-children { display: block; }
.folder-closed > .file-tree-children { display: none; }
.file-content-pane {
  margin-top: 8px; padding: 8px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 6px;
  max-height: 60vh; overflow: auto;
  font-family: var(--mono); font-size: 12px; white-space: pre-wrap;
  word-break: break-all;
}

/* Turn cards */
.turn-card {
  border: 1px solid var(--border); border-radius: 8px;
  margin-bottom: 12px; overflow: hidden;
}
.turn-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; background: var(--bg2);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.turn-header:hover { background: var(--bg3); }
.turn-header .turn-num {
  font-family: var(--mono); font-weight: 600; font-size: 14px;
}
.turn-header .turn-time { color: var(--fg2); font-size: 12px; margin-left: auto; }
.turn-header .turn-dur { color: var(--fg2); font-size: 11px; }
.turn-body { padding: 0 12px 12px; }
.turn-body.collapsed { display: none; }

/* Thinking block */
.thinking-block {
  margin: 8px 0; padding: 12px; border-radius: 6px;
  background: var(--bg); border: 1px solid var(--border);
  border-left: 3px solid var(--fg2);
}
.thinking-block .thinking-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--fg2); margin-bottom: 4px;
}
.thinking-block .thinking-text {
  font-style: italic; color: #8b949e; line-height: 1.6;
  white-space: pre-wrap; word-break: break-word;
  font-size: 13px;
}
.thinking-block.collapsed .thinking-text { display: none; }
.thinking-toggle {
  cursor: pointer; user-select: none; font-size: 12px;
  color: var(--accent);
}
.thinking-toggle:hover { text-decoration: underline; }

/* Operator request highlight */
.operator-request {
  display: inline; background: rgba(210, 153, 34, 0.15);
  border: 1px solid var(--orange); border-radius: 4px;
  padding: 1px 4px; font-weight: 500;
}
.operator-request-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--orange); font-weight: 700;
}

/* Operator input block */
.operator-block {
  margin: 8px 0; padding: 12px; border-radius: 6px;
  background: var(--bg); border: 1px solid var(--border);
  border-left: 3px solid var(--orange);
}
.operator-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--orange); margin-bottom: 4px;
}
.operator-text {
  color: var(--fg); font-size: 13px; line-height: 1.5;
  white-space: pre-wrap; word-break: break-word;
}

/* Reflection block */
.reflection-block {
  margin: 8px 0; padding: 12px; border-radius: 6px;
  background: var(--bg); border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
}
.reflection-block .reflection-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--accent); margin-bottom: 4px;
}
.reflection-block .reflection-text {
  color: #c9d1d9; font-size: 13px; line-height: 1.5;
  white-space: pre-wrap; word-break: break-word;
}
.reflection-block.collapsed .reflection-text { display: none; }

/* Action entries */
.action-entry {
  margin: 6px 0; padding: 8px 12px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg2);
  border-left: 3px solid var(--fg2);
}
.action-entry.success { border-left-color: var(--green); }
.action-entry.fail { border-left-color: var(--red); }
.action-entry .action-header {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; user-select: none;
}
.action-entry .action-header .action-icon { font-size: 14px; }
.action-entry .action-header .action-type {
  font-weight: 500; font-size: 13px;
}
.action-entry .action-header .action-detail {
  font-family: var(--mono); font-size: 12px; color: var(--fg2);
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.action-entry .action-header .action-status {
  font-size: 14px;
}
.action-entry .action-body { margin-top: 8px; }
.action-entry .action-body.collapsed { display: none; }
.action-entry .result-block {
  margin-top: 4px; padding: 8px; background: var(--bg);
  border-radius: 4px; font-family: var(--mono); font-size: 12px;
  white-space: pre-wrap; word-break: break-all;
  max-height: 200px; overflow: auto;
}
.action-entry .result-block .stderr-text { color: var(--red); }
.action-entry .result-block .error-text { color: var(--red); font-weight: 500; }

/* Prose (raw text minus thinking tags) */
.prose-text {
  padding: 8px 0; font-size: 13px; color: var(--fg);
  white-space: pre-wrap; word-break: break-word;
}

/* Empty state */
.empty-state { text-align: center; padding: 40px; color: var(--fg2); }

/* Loader */
#loader { text-align: center; padding: 40px; color: var(--fg2); }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Progress bar */
#progress-bar {
  height: 2px; background: var(--accent);
  position: fixed; top: 0; left: 0; z-index: 100;
  transition: width 0.3s;
}

/* Loading spinner */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* File in workspace sidebar */
.file-tree-item.file .icon { color: var(--fg2); }
.file-tree-item .file-preview {
  display: none; margin-top: 4px;
}
.file-tree-item.file.selected > .file-preview { display: block; }

/* Auto-refresh indicator */
#auto-refresh { font-size: 11px; color: var(--fg2); display: flex; align-items: center; gap: 4px; }
</style>
</head>
<body>
<div id="app">
  <div id="progress-bar" style="width:0"></div>
  <div id="topbar">
    <h1>HAL9000 Logs</h1>
    <select id="date-select"></select>
    <button id="btn-refresh">⟳ Refresh</button>
    <span id="auto-refresh"><span class="spinner" style="display:none" id="refresh-spinner"></span> auto</span>
    <div class="stats" id="stats-bar">—</div>
    <input id="search-box" placeholder="Search turns…" autocomplete="off">
  </div>
  <div id="main">
    <div id="sidebar">
      <div class="sidebar-section">
        <h3>State</h3>
        <div id="state-display"><div class="state-row"><span class="label">Loading…</span></div></div>
      </div>
      <div class="sidebar-section">
        <h3>Workspace</h3>
        <div id="workspace-tree"><div class="state-row"><span class="label">Loading…</span></div></div>
      </div>
    </div>
    <div id="sidebar-resizer"></div>
    <div id="content">
      <div id="loader"><span class="spinner"></span> Loading logs…</div>
      <div id="turns-container"></div>
    </div>
  </div>
</div>
<script>
(function(){
'use strict';

const STATE = {
  date: '',
  thoughts: [],
  actions: [],
  updates: [],
  workspaceTree: null,
};

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── Date selector ──
async function loadDates() {
  const dates = await api('/api/logs/dates');
  const sel = document.getElementById('date-select');
  sel.innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
  if (dates.length) {
    sel.value = dates[0];
    STATE.date = dates[0];
  }
  return dates;
}

// ── Load logs for date ──
async function loadLogs(date) {
  if (!date) return;
  const [thoughts, actions, updates] = await Promise.all([
    api(`/api/logs/thoughts?date=${date}`),
    api(`/api/logs/actions?date=${date}`),
    api(`/api/logs/updates?date=${date}`),
  ]);
  STATE.thoughts = thoughts;
  STATE.actions = actions;
  STATE.updates = updates;
}

// ── State display ──
async function loadState() {
  const stateData = await api('/api/state');
  const el = document.getElementById('state-display');
  if (stateData.error) {
    el.innerHTML = `<div class="state-row"><span class="label">${stateData.error}</span></div>`;
    return;
  }
  const turn = stateData.turn ?? '—';
  const updated = stateData.last_updated ? stateData.last_updated.slice(0,19).replace('T',' ') : '—';
  const model = stateData.model || '—';
  const agent = stateData.agent || {};
  el.innerHTML = `
    <div class="state-row"><span class="label">Turn</span><span class="value">${turn}</span></div>
    <div class="state-row"><span class="label">Updated</span><span class="value">${updated}</span></div>
    <div class="state-row"><span class="label">Model</span><span class="value">${model}</span></div>
  `;
}

// ── Workspace browser ──
async function loadWorkspace() {
  const treeEl = document.getElementById('workspace-tree');
  const data = await api('/api/workspace/list');
  treeEl.innerHTML = renderTree(data.entries || [], '/');
  attachTreeEvents();
}

function renderTree(entries, basePath) {
  if (!entries || !entries.length) return '<div class="state-row"><span class="label">(empty)</span></div>';
  let html = '<div class="file-tree">';
  for (const e of entries) {
    if (e.type === 'directory') {
      html += `<div class="folder-closed file-tree-item dir" data-path="${basePath}${e.name}/">`;
      html += `<span class="arrow">▶</span><span class="icon">📁</span>${e.name}</div>`;
      html += '<div class="file-tree-children"></div></div>';
    } else {
      html += `<div class="file-tree-item file" data-path="${basePath}${e.name}">`;
      html += `<span class="arrow"></span><span class="icon">📄</span>${e.name}`;
      if (e.size != null) html += `<span class="size">${formatSize(e.size)}</span>`;
      html += '</div>';
    }
  }
  html += '</div>';
  return html;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
  return (bytes/1024/1024).toFixed(1) + 'MB';
}

function attachTreeEvents() {
  // Click directory to toggle open/load children
  document.querySelectorAll('.file-tree-item.dir').forEach(el => {
    el.addEventListener('click', async function(e) {
      e.stopPropagation();
      const isOpen = this.classList.contains('folder-open');
      if (isOpen) {
        this.classList.remove('folder-open');
        this.classList.add('folder-closed');
        this.querySelector('.arrow').textContent = '▶';
      } else {
        this.classList.remove('folder-closed');
        this.classList.add('folder-open');
        this.querySelector('.arrow').textContent = '▼';
        const children = this.nextElementSibling;
        if (children && !children.hasChildNodes()) {
          const path = this.dataset.path;
          try {
            const data = await api(`/api/workspace/list?path=${encodeURIComponent(path)}`);
            children.innerHTML = renderTree(data.entries || [], path);
            attachTreeEvents();
          } catch(e) {}
        }
      }
    });
  });
  // Click file to show preview
  document.querySelectorAll('.file-tree-item.file').forEach(el => {
    el.addEventListener('click', async function(e) {
      e.stopPropagation();
      document.querySelectorAll('.file-tree-item.file.selected').forEach(x => x.classList.remove('selected'));
      this.classList.add('selected');
      const path = this.dataset.path;
      // Remove old preview
      const old = this.querySelector('.file-preview');
      if (old) old.remove();
      const preview = document.createElement('div');
      preview.className = 'file-preview';
      preview.innerHTML = '<span class="spinner"></span>';
      this.appendChild(preview);
      try {
        const data = await api(`/api/workspace/file?path=${encodeURIComponent(path)}`);
        if (data.content != null) {
          preview.innerHTML = `<pre class="file-content-pane">${escHtml(data.content)}</pre>`;
        } else {
          preview.innerHTML = `<div class="error-text">${escHtml(data.error || 'Cannot view file')}</div>`;
        }
      } catch(e) {
        preview.innerHTML = `<div class="error-text">${escHtml(e.message)}</div>`;
      }
    });
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightOpRequests(text) {
  // Highlight [OPERATOR_REQUEST] tags and the text following them
  text = text.replace(
    /(\[OPERATOR_REQUEST\])([^<]*?(?:\.|(?=<\/)|$))/g,
    '<span class="operator-request"><span class="operator-request-label">OPERATOR</span> $2</span>'
  );
  // Also highlight "TO OPERATOR:" prefix
  text = text.replace(
    /(TO OPERATOR:)([^<]*?(?:\.|(?=<\/)|$))/gi,
    '<span class="operator-request"><span class="operator-request-label">OPERATOR</span> $2</span>'
  );
  return text;
}

// ── Build turn cards ──
function buildTurns(thoughts, actions, searchTerm) {
  if (!thoughts.length && !actions.length) {
    return '<div class="empty-state">No log entries for this date.</div>';
  }

  // Group entries by turn
  const byTurn = {};
  for (const th of thoughts) {
    const t = th.turn;
    if (!byTurn[t]) byTurn[t] = [];
    byTurn[t].push(th);
  }
  for (const a of actions) {
    const t = a.turn;
    if (!byTurn[t]) byTurn[t] = [];
    byTurn[t].push(a);
  }

  let turns = Object.keys(byTurn).map(Number).sort((a, b) => b - a);

  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    turns = turns.filter(turn => {
      const entries = byTurn[turn] || [];
      const text = entries.map(e => JSON.stringify(e)).join(' ').toLowerCase();
      return text.includes(q);
    });
  }

  return turns.map(turn => {
    return buildTurnCard(turn, byTurn[turn] || []);
  }).join('\n');
}

function buildTurnCard(turn, entries) {
  const thought = entries.find(e => e.type === 'thought');
  const operatorInputs = entries.filter(e => e.type === 'operator_input');
  const actions = entries.filter(e => e.type === 'action_result' || e.type === 'action_log' || e.post_execution || e.pre_execution);

  const hasThinking = thought && thought.thinking;
  const hasReflection = thought && thought.reflection;
  const ts = thought ? (thought.timestamp || '').slice(0, 19).replace('T', ' ') : '';
  const dur = thought ? thought.duration_ms : null;
  const durStr = dur != null ? (dur >= 1000 ? (dur/1000).toFixed(1)+'s' : dur+'ms') : '';

  // Prose text (text without thinking/reflection tags)
  let prose = thought ? (thought.text || '') : '';
  // Remove <thinking> and <reflection> tags for display
  const cleanProse = prose.replace(/<\/?thinking>|<\/?reflection>/g, '').trim();
  // Also remove action blocks from prose (they're shown separately)
  const proseOnly = cleanProse.replace(/```action[\s\S]*?```/g, '').trim();

  let html = `<div class="turn-card" data-turn="${turn}">`;
  html += `<div class="turn-header" onclick="document.querySelector('#turn-body-${turn}').classList.toggle('collapsed')">`;
  html += `<span class="turn-num">Turn ${turn}</span>`;
  if (ts) html += `<span class="turn-time">${ts}</span>`;
  if (durStr) html += `<span class="turn-dur">${durStr}</span>`;
  html += `</div>`;
  html += `<div class="turn-body" id="turn-body-${turn}">`;

  // Operator input sections
  for (const op of operatorInputs) {
    html += `<div class="operator-block">`;
    html += `<div class="operator-label">⬆ Operator</div>`;
    html += `<div class="operator-text">${escHtml(op.text || '')}</div>`;
    html += `</div>`;
  }

  // Thinking section
  if (hasThinking) {
    html += `<div class="thinking-block" id="thinking-${turn}">`;
    html += `<div class="thinking-label">Thinking <span class="thinking-toggle" onclick="event.stopPropagation();toggleThinking(${turn})">[hide]</span></div>`;
    html += `<div class="thinking-text">${highlightOpRequests(escHtml(thought.thinking))}</div>`;
    html += `</div>`;
  }

  // Reflection section
  if (hasReflection) {
    html += `<div class="reflection-block" id="reflection-${turn}">`;
    html += `<div class="reflection-label">Reflection <span class="thinking-toggle" onclick="event.stopPropagation();toggleReflection(${turn})">[hide]</span></div>`;
    html += `<div class="reflection-text">${escHtml(thought.reflection)}</div>`;
    html += `</div>`;
  }

  // Prose
  if (proseOnly) {
    html += `<div class="prose-text">${highlightOpRequests(escHtml(proseOnly))}</div>`;
  }

  // Actions
  for (const a of actions) {
    const isResult = a.type === 'action_result' || a.post_execution;
    const isPre = a.type === 'action_log' || a.pre_execution;
    const actionType = a.action || '';
    const success = a.result ? a.result.success : null;
    const statusIcon = success === true ? '✓' : success === false ? '✗' : '';
    const resultClass = success === true ? 'success' : success === false ? 'fail' : '';
    const path = a.path || a.command || '';
    const truncatedPath = path.length > 80 ? path.slice(0, 80) + '…' : path;

    if (isResult) {
      html += `<div class="action-entry ${resultClass}">`;
      html += `<div class="action-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">`;
      html += `<span class="action-icon">⚡</span>`;
      html += `<span class="action-type">${escHtml(actionType)}</span>`;
      html += `<span class="action-detail">${escHtml(truncatedPath)}</span>`;
      if (statusIcon) html += `<span class="action-status">${statusIcon}</span>`;
      html += `</div>`;
      html += `<div class="action-body">`;
      if (a.result) {
        if (a.result.stdout) {
          html += `<div class="result-block">${escHtml(a.result.stdout)}</div>`;
        }
        if (a.result.stderr) {
          html += `<div class="result-block"><span class="stderr-text">${escHtml(a.result.stderr)}</span></div>`;
        }
        if (a.result.error) {
          html += `<div class="result-block"><span class="error-text">${escHtml(a.result.error)}</span></div>`;
        }
      }
      html += `</div></div>`;
    }
  }

  html += `</div></div>`;
  return html;
}

function toggleThinking(turn) {
  const block = document.getElementById(`thinking-${turn}`);
  if (!block) return;
  block.classList.toggle('collapsed');
  const toggle = block.querySelector('.thinking-toggle');
  toggle.textContent = block.classList.contains('collapsed') ? '[show]' : '[hide]';
}

function toggleReflection(turn) {
  const block = document.getElementById(`reflection-${turn}`);
  if (!block) return;
  block.classList.toggle('collapsed');
  const toggle = block.querySelector('.thinking-toggle');
  toggle.textContent = block.classList.contains('collapsed') ? '[show]' : '[hide]';
}

// ── Search ──
let searchTimeout;
document.getElementById('search-box').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => render(), 300);
});

// ── Refresh ──
async function refresh() {
  const bar = document.getElementById('progress-bar');
  bar.style.width = '30%';

  try {
    await loadLogs(STATE.date);
    bar.style.width = '60%';
    await loadState();
    bar.style.width = '80%';
    render();
    bar.style.width = '100%';
    setTimeout(() => { bar.style.width = '0'; }, 500);
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="empty-state">Error: ${escHtml(e.message)}</div>`;
    bar.style.width = '0';
  }
}

function render() {
  const searchTerm = document.getElementById('search-box').value;
  const container = document.getElementById('turns-container');
  document.getElementById('loader').style.display = 'none';
  container.innerHTML = buildTurns(STATE.thoughts, STATE.actions, searchTerm);

  // Stats
  const totalTurns = STATE.thoughts.length;
  const totalActions = STATE.actions.filter(a => a.post_execution).length;
  const successActions = STATE.actions.filter(a => a.post_execution && a.result && a.result.success === true).length;
  const failActions = STATE.actions.filter(a => a.post_execution && a.result && a.result.success === false).length;
  document.getElementById('stats-bar').textContent =
    `Turns: ${totalTurns} | Actions: ${totalActions} (✓${successActions} ✗${failActions})`;

  // Collapse all thinking blocks by default
  STATE.thoughts.forEach(t => {
    if (t.thinking) {
      const block = document.getElementById(`thinking-${t.turn}`);
      if (block && !block.classList.contains('collapsed')) {
        block.classList.add('collapsed');
        const toggle = block.querySelector('.thinking-toggle');
        if (toggle) toggle.textContent = '[show]';
      }
    }
  });
}

// ── Auto-refresh —─
let autoRefreshTimer;

function startAutoRefresh() {
  const spinner = document.getElementById('refresh-spinner');
  spinner.style.display = 'inline-block';
  refresh().then(() => {
    spinner.style.display = 'none';
  });
}

// ── Init ──
async function init() {
  const dates = await loadDates();
  if (!dates.length) {
    document.getElementById('content').innerHTML = '<div class="empty-state">No logs found. Start the agent first.</div>';
    document.getElementById('loader').style.display = 'none';
    document.getElementById('state-display').innerHTML = '<div class="state-row"><span class="label">No state</span></div>';
    document.getElementById('workspace-tree').innerHTML = '<div class="state-row"><span class="label">No workspace</span></div>';
    return;
  }

  // Date selector change
  document.getElementById('date-select').addEventListener('change', function() {
    STATE.date = this.value;
    startAutoRefresh();
  });

  // Refresh button
  document.getElementById('btn-refresh').addEventListener('click', startAutoRefresh);

  // Load workspace in background
  loadWorkspace().catch(() => {
    document.getElementById('workspace-tree').innerHTML = '<div class="state-row"><span class="label">Cannot load workspace</span></div>';
  });

  // Initial load
  await startAutoRefresh();

  // Auto-refresh every 15s
  autoRefreshTimer = setInterval(() => {
    startAutoRefresh();
  }, 15000);
}

init().catch(e => {
  document.getElementById('content').innerHTML = `<div class="empty-state">Init error: ${escHtml(e.message)}</div>`;
  document.getElementById('loader').style.display = 'none';
});

// Sidebar resizer
(function() {
  const resizer = document.getElementById('sidebar-resizer');
  const sidebar = document.getElementById('sidebar');
  let startX, startW;

  function onMouseDown(e) {
    startX = e.clientX;
    startW = sidebar.getBoundingClientRect().width;
    resizer.classList.add('dragging');
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  }

  function onMouseMove(e) {
    const w = Math.max(160, Math.min(600, startW + e.clientX - startX));
    sidebar.style.width = w + 'px';
  }

  function onMouseUp() {
    resizer.classList.remove('dragging');
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }

  resizer.addEventListener('mousedown', onMouseDown);
})();

})();
</script>
